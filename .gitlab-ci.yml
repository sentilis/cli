image: node:22

stages:
  - build
  - publish

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - packages/core/dist/
      - apps/cli/dist/
    expire_in: 1 hour

publish:
  stage: publish
  script:
    - echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
    - npm ci
    - VERSION="${CI_COMMIT_TAG#v}"
    - npm version "$VERSION" --workspaces --no-git-tag-version --allow-same-version
    - npm publish --workspaces --access public --tag latest
  rules:
    - if: $CI_COMMIT_TAG
